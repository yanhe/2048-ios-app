name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Add iOS platform
      run: npx cap add ios

    - name: Sync Capacitor
      run: npx cap sync

    - name: Verify web resources
      run: |
        echo "Checking ios/App/App/public directory..."
        ls -la ios/App/App/public/ || echo "public directory not found!"
        echo "Checking if index.html exists..."
        test -f ios/App/App/public/index.html && echo "index.html found" || echo "index.html NOT found!"

    - name: Fix iOS ATS for external CDN
      run: |
        # 修改 Info.plist 允许访问外部 CDN
        /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" ios/App/App/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" ios/App/App/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" ios/App/App/Info.plist
        echo "Updated Info.plist:"
        cat ios/App/App/Info.plist

    - name: Build IPA (unsigned)
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -destination generic/platform=iOS \
          archive -archivePath $PWD/build/App.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          | xcpretty

    - name: Export unsigned IPA
      run: |
        cd ios/App
        # 创建导出目录
        mkdir -p $PWD/build/Payload
        # 复制 app 文件
        cp -r $PWD/build/App.xcarchive/Products/Applications/App.app $PWD/build/Payload/
        # 打包成 ipa
        cd $PWD/build
        zip -r ../GameCenter-unsigned.ipa Payload

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameCenter-unsigned-ipa
        path: ios/App/GameCenter-unsigned.ipa

  build-simulator:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Add iOS platform
      run: npx cap add ios

    - name: Sync Capacitor
      run: npx cap sync

    - name: Verify web resources
      run: |
        echo "Checking ios/App/App/public directory..."
        ls -la ios/App/App/public/ || echo "public directory not found!"
        echo "Checking if index.html exists..."
        test -f ios/App/App/public/index.html && echo "index.html found" || echo "index.html NOT found!"

    - name: Fix iOS ATS for external CDN
      run: |
        # 修改 Info.plist 允许访问外部 CDN
        /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" ios/App/App/Info.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" ios/App/App/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" ios/App/App/Info.plist

    - name: Build for Simulator
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPad (10th generation)' \
          build \
          | xcpretty

    - name: Upload Simulator App
      uses: actions/upload-artifact@v4
      with:
        name: GameCenter-Simulator
        path: ios/App/build/Debug-iphonesimulator/App.app

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'self' data: blob: 'unsafe-inline' 'unsafe-eval' https: http:;">
    <title>游戏中心 - 2048 & 数独</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone@7.22.0/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&display=swap');
        body {
            font-family: 'Clear Sans', sans-serif;
            background-color: #f5f5f5;
            overscroll-behavior: none;
            touch-action: none;
        }
        .tile-new { animation: appear 0.2s ease-in-out; }
        @keyframes appear { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }
        .game-board-2048 { touch-action: none; user-select: none; -webkit-user-select: none; position: relative; }
        .sudoku-cell { transition: all 0.15s ease; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sudoku-cell:hover:not(.fixed-cell) { background: #f5f5f5; }
        .sudoku-cell.selected { background: #1976d2 !important; color: white !important; }
        .sudoku-cell.same-number { background: #bbdefb; }
        .sudoku-cell.fixed-cell { color: #1a237e; background: #e8eaf6; font-weight: bold; }
        .note-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); width: 100%; height: 100%; font-size: 10px; color: #757575; }
        .game-card { transition: all 0.2s ease; }
        .game-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        #error-log { position: fixed; top: 0; left: 0; right: 0; background: #ff4444; color: white; padding: 10px; z-index: 9999; font-size: 12px; max-height: 200px; overflow: auto; display: none; }
        .back-btn { position: fixed; top: 50px; left: 20px; z-index: 100; }
        /* 数独宫格边框样式 */
        .sudoku-grid { display: grid; grid-template-columns: repeat(9, 1fr); border: 3px solid #1e40af; }
        .sudoku-cell { border: 1px solid #93c5fd; width: 50px; height: 50px; font-size: 24px; }
        /* 每3列后的右边框加粗 */
        .sudoku-cell:nth-child(3n) { border-right: 3px solid #1e40af; }
        /* 最后一列不需要右边框 */
        .sudoku-cell:nth-child(9n) { border-right: none; }
        /* 每3行后的下边框加粗 */
        .sudoku-cell:nth-child(n+19):nth-child(-n+27),
        .sudoku-cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 3px solid #1e40af; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <div id="root"></div>
    <script>
        // 错误日志显示
        const errorLog = document.getElementById('error-log');
        window.onerror = function(msg, url, line, col, error) {
            errorLog.style.display = 'block';
            errorLog.innerHTML += `<div><strong>Error:</strong> ${msg} (line ${line})</div>`;
            return false;
        };
        window.addEventListener('unhandledrejection', function(e) {
            errorLog.style.display = 'block';
            errorLog.innerHTML += `<div><strong>Promise Error:</strong> ${e.reason}</div>`;
        });

        // 检查依赖加载
        if (typeof React === 'undefined') {
            errorLog.style.display = 'block';
            errorLog.innerHTML += '<div><strong>React not loaded!</strong></div>';
        }
        if (typeof ReactDOM === 'undefined') {
            errorLog.style.display = 'block';
            errorLog.innerHTML += '<div><strong>ReactDOM not loaded!</strong></div>';
        }
        if (typeof Babel === 'undefined') {
            errorLog.style.display = 'block';
            errorLog.innerHTML += '<div><strong>Babel not loaded!</strong></div>';
        }

        // 2048音效 - 使用Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playMoveSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = 300;
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }
        function playMergeSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = 500;
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        }
    </script>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const storage = {
            get: (key, defaultValue) => {
                try {
                    if (typeof localStorage === 'undefined') return defaultValue;
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    return defaultValue;
                }
            },
            set: (key, value) => {
                try {
                    if (typeof localStorage !== 'undefined') {
                        localStorage.setItem(key, JSON.stringify(value));
                    }
                } catch (e) {}
            }
        };

        const formatTime = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        };

        // ==================== 游戏选择 ====================
        const GameSelector = ({ onSelectGame, stats }) => (
            <div className="min-h-screen flex flex-col items-center justify-center p-8">
                <h1 className="text-6xl font-bold text-gray-800 mb-4">游戏中心</h1>
                <p className="text-gray-500 mb-12 text-xl">选择一个游戏开始游玩</p>
                <div className="flex gap-10">
                    <div onClick={() => onSelectGame('2048')} className="game-card bg-white rounded-3xl p-10 cursor-pointer w-80 shadow-lg border border-gray-200">
                        <div className="text-7xl font-bold text-orange-600 mb-4">2048</div>
                        <div className="text-gray-600 mb-8 text-lg">经典数字合并游戏</div>
                        <div className="space-y-3 text-base text-gray-700">
                            <div className="flex justify-between"><span>最高分:</span><span className="font-bold">{stats['2048']?.bestScore || 0}</span></div>
                            <div className="flex justify-between"><span>游戏次数:</span><span className="font-bold">{stats['2048']?.gamesPlayed || 0}</span></div>
                        </div>
                    </div>
                    <div onClick={() => onSelectGame('sudoku')} className="game-card bg-white rounded-3xl p-10 cursor-pointer w-80 shadow-lg border border-gray-200">
                        <div className="text-7xl font-bold text-blue-600 mb-4">数独</div>
                        <div className="text-gray-600 mb-8 text-lg">经典数字逻辑游戏</div>
                        <div className="space-y-3 text-base text-gray-700">
                            <div className="flex justify-between"><span>完成次数:</span><span className="font-bold">{stats.sudoku?.completed || 0}</span></div>
                            <div className="flex justify-between"><span>最快时间:</span><span className="font-bold">{stats.sudoku?.bestTime ? formatTime(stats.sudoku.bestTime) : '--:--'}</span></div>
                        </div>
                    </div>
                    <div onClick={() => onSelectGame('24point')} className="game-card bg-white rounded-3xl p-10 cursor-pointer w-80 shadow-lg border border-gray-200">
                        <div className="text-7xl font-bold text-green-600 mb-4">24点</div>
                        <div className="text-gray-600 mb-8 text-lg">加减法挑战</div>
                        <div className="space-y-3 text-base text-gray-700">
                            <div className="flex justify-between"><span>完成题数:</span><span className="font-bold">{stats['24point']?.completed || 0}</span></div>
                            <div className="flex justify-between"><span>总尝试:</span><span className="font-bold">{stats['24point']?.totalAttempts || 0}</span></div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // ==================== 2048 游戏 ====================
        const GRID_SIZE_2048 = 4;
        const TILE_SIZE = 100;
        const GAP = 12;

        const getTileColor = (value) => {
            const colors = { 2: { bg: '#eee4da', text: '#776e65' }, 4: { bg: '#ede0c8', text: '#776e65' }, 8: { bg: '#f2b179', text: '#f9f6f2' }, 16: { bg: '#f59563', text: '#f9f6f2' }, 32: { bg: '#f67c5f', text: '#f9f6f2' }, 64: { bg: '#f65e3b', text: '#f9f6f2' }, 128: { bg: '#edcf72', text: '#f9f6f2' }, 256: { bg: '#edcc61', text: '#f9f6f2' }, 512: { bg: '#edc850', text: '#f9f6f2' }, 1024: { bg: '#edc53f', text: '#f9f6f2' }, 2048: { bg: '#edc22e', text: '#f9f6f2' } };
            return colors[value] || { bg: '#3c3a32', text: '#f9f6f2' };
        };
        const createEmptyBoard2048 = () => Array(GRID_SIZE_2048).fill(null).map(() => Array(GRID_SIZE_2048).fill(0));
        const addRandomTile2048 = (board) => {
            const emptyCells = [];
            for (let r = 0; r < GRID_SIZE_2048; r++) for (let c = 0; c < GRID_SIZE_2048; c++) if (board[r][c] === 0) emptyCells.push({ r, c });
            if (emptyCells.length === 0) return board;
            const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
            return board;
        };
        const Game2048 = ({ onBack, onUpdateStats }) => {
            const [board, setBoard] = useState(() => { const b = createEmptyBoard2048(); return addRandomTile2048(addRandomTile2048(b)); });
            const [score, setScore] = useState(0);
            const [bestScore, setBestScore] = useState(() => storage.get('2048-best', 0));
            const [gameOver, setGameOver] = useState(false);
            const [won, setWon] = useState(false);
            const touchStart = useRef(null);
            const prevBoardRef = useRef(null);

            const move = useCallback((direction) => {
                if (gameOver) return;
                let newBoard = board.map(row => [...row]);
                let moved = false, merged = false, newScore = 0;
                const slide = (row) => {
                    row = row.filter(val => val);
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i + 1]) {
                            row[i] *= 2;
                            newScore += row[i];
                            merged = true;
                            if (row[i] === 2048 && !won) { setWon(true); onUpdateStats('2048', { wins: true }); }
                            row.splice(i + 1, 1);
                        }
                    }
                    while (row.length < GRID_SIZE_2048) row.push(0);
                    return row;
                };
                if (direction === 'left') {
                    for (let r = 0; r < GRID_SIZE_2048; r++) {
                        const oldRow = [...newBoard[r]];
                        newBoard[r] = slide(newBoard[r]);
                        if (oldRow.toString() !== newBoard[r].toString()) moved = true;
                    }
                }
                else if (direction === 'right') {
                    for (let r = 0; r < GRID_SIZE_2048; r++) {
                        const oldRow = [...newBoard[r]];
                        newBoard[r] = slide(newBoard[r].reverse()).reverse();
                        if (oldRow.toString() !== newBoard[r].toString()) moved = true;
                    }
                }
                else if (direction === 'up') {
                    for (let c = 0; c < GRID_SIZE_2048; c++) {
                        const col = slide([newBoard[0][c], newBoard[1][c], newBoard[2][c], newBoard[3][c]]);
                        const oldCol = [board[0][c], board[1][c], board[2][c], board[3][c]];
                        for (let r = 0; r < GRID_SIZE_2048; r++) newBoard[r][c] = col[r];
                        if (oldCol.toString() !== col.toString()) moved = true;
                    }
                }
                else if (direction === 'down') {
                    for (let c = 0; c < GRID_SIZE_2048; c++) {
                        const col = slide([newBoard[3][c], newBoard[2][c], newBoard[1][c], newBoard[0][c]]).reverse();
                        const oldCol = [board[0][c], board[1][c], board[2][c], board[3][c]];
                        for (let r = 0; r < GRID_SIZE_2048; r++) newBoard[r][c] = col[r];
                        if (oldCol.toString() !== col.toString()) moved = true;
                    }
                }
                if (moved) {
                    newBoard = addRandomTile2048(newBoard);
                    setBoard(newBoard);
                    const newTotalScore = score + newScore;
                    setScore(newTotalScore);
                    // 播放音效
                    if (merged) playMergeSound();
                    else playMoveSound();
                    if (newTotalScore > bestScore) { setBestScore(newTotalScore); storage.set('2048-best', newTotalScore); }
                    if (!canMove(newBoard)) { setGameOver(true); onUpdateStats('2048', { bestScore: newTotalScore, gamesPlayed: true }); }
                }
            }, [board, score, gameOver, won, bestScore, onUpdateStats]);

            const canMove = (b) => {
                for (let r = 0; r < GRID_SIZE_2048; r++) for (let c = 0; c < GRID_SIZE_2048; c++) if (b[r][c] === 0) return true;
                for (let r = 0; r < GRID_SIZE_2048; r++) for (let c = 0; c < GRID_SIZE_2048 - 1; c++) if (b[r][c] === b[r][c + 1]) return true;
                for (let c = 0; c < GRID_SIZE_2048; c++) for (let r = 0; r < GRID_SIZE_2048 - 1; r++) if (b[r][c] === b[r + 1][c]) return true;
                return false;
            };
            const reset = () => { const b = createEmptyBoard2048(); setBoard(addRandomTile2048(addRandomTile2048(b))); setScore(0); setGameOver(false); setWon(false); };

            useEffect(() => {
                const handleKeyDown = (e) => { if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) { e.preventDefault(); move(e.key.replace('Arrow', '').toLowerCase()); } };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [move]);

            const handleTouchStart = (e) => { touchStart.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
            const handleTouchEnd = (e) => {
                if (!touchStart.current) return;
                const dx = e.changedTouches[0].clientX - touchStart.current.x;
                const dy = e.changedTouches[0].clientY - touchStart.current.y;
                if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left'); }
                else { if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up'); }
                touchStart.current = null;
            };

            const boardSize = GRID_SIZE_2048 * TILE_SIZE + (GRID_SIZE_2048 + 1) * GAP;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <button onClick={onBack} className="back-btn text-2xl font-bold text-gray-600 hover:text-gray-800 transition-colors bg-white/80 px-4 py-2 rounded-xl shadow">← 返回</button>
                    <h1 className="text-6xl font-bold text-orange-600 mb-6">2048</h1>
                    <div className="flex gap-8 mb-6">
                        <div className="bg-orange-100 rounded-xl px-6 py-3 text-center"><div className="text-sm text-orange-600 font-bold">得分</div><div className="text-3xl font-bold text-orange-800">{score}</div></div>
                        <div className="bg-orange-100 rounded-xl px-6 py-3 text-center"><div className="text-sm text-orange-600 font-bold">最高分</div><div className="text-3xl font-bold text-orange-800">{bestScore}</div></div>
                    </div>
                    <div className="game-board-2048 bg-[#bbada0] rounded-xl p-3 mb-6" style={{ width: boardSize, height: boardSize }} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        {board.map((row, r) => row.map((cell, c) => (
                            <div key={`${r}-${c}`} style={{ position: 'absolute', width: TILE_SIZE, height: TILE_SIZE, left: GAP + c * (TILE_SIZE + GAP), top: GAP + r * (TILE_SIZE + GAP), backgroundColor: cell ? getTileColor(cell).bg : 'rgba(238, 228, 218, 0.35)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: cell > 512 ? 40 : 50, fontWeight: 'bold', color: getTileColor(cell).text, transition: 'all 0.15s ease' }} className={cell ? 'tile-new' : ''}>{cell || ''}</div>
                        )))}
                    </div>
                    <button onClick={reset} className="bg-orange-600 hover:bg-orange-700 text-white text-xl font-bold py-3 px-8 rounded-xl transition-colors">重新开始</button>
                    {(gameOver || won) && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-3xl p-10 text-center">
                                <div className="text-5xl font-bold mb-4">{won ? '🎉 恭喜获胜!' : '😔 游戏结束'}</div>
                                <div className="text-2xl text-gray-600 mb-6">最终得分: {score}</div>
                                <button onClick={reset} className="bg-orange-600 hover:bg-orange-700 text-white text-xl font-bold py-3 px-8 rounded-xl">再玩一次</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== 数独游戏 ====================
        // 参考标准数独设计：简易约35-40个提示，中等约45-50个提示，困难约55-60个提示
        const DIFFICULTY_SETTINGS = {
            easy: { emptyCount: 40, name: '简易', hints: 41 },      // 81-40=41个预填
            medium: { emptyCount: 50, name: '中等', hints: 31 },    // 81-50=31个预填
            hard: { emptyCount: 60, name: '困难', hints: 21 }       // 81-60=21个预填
        };

        const Sudoku = ({ onBack, onUpdateStats }) => {
            const [difficulty, setDifficulty] = useState(null);
            const [gameState, setGameState] = useState(null);
            const [board, setBoard] = useState(null);
            const [solution, setSolution] = useState(null);
            const [fixed, setFixed] = useState(null);
            const [selected, setSelected] = useState(null);
            const [notes, setNotes] = useState(() => Array(9).fill(null).map(() => Array(9).fill(null).map(() => [])));
            const [noteMode, setNoteMode] = useState(false);
            const [timer, setTimer] = useState(0);
            const [completed, setCompleted] = useState(false);

            const generateCompleteBoard = () => {
                const board = Array(9).fill(null).map(() => Array(9).fill(0));
                const isValid = (b, r, c, n) => {
                    for (let i = 0; i < 9; i++) if (b[r][i] === n || b[i][c] === n) return false;
                    const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
                    for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) if (b[br + i][bc + j] === n) return false;
                    return true;
                };
                const solve = (b) => {
                    for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) if (b[r][c] === 0) {
                        const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                        for (const n of nums) if (isValid(b, r, c, n)) { b[r][c] = n; if (solve(b)) return true; b[r][c] = 0; }
                        return false;
                    }
                    return true;
                };
                solve(board);
                return board;
            };

            const generateSudoku = (diff) => {
                // 生成完整解
                const fullSolution = generateCompleteBoard();
                const puzzle = fullSolution.map(row => [...row]);
                const emptyCount = DIFFICULTY_SETTINGS[diff].emptyCount;

                // 随机挖空
                let removed = 0;
                const positions = [];
                for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) positions.push([r, c]);
                positions.sort(() => Math.random() - 0.5);

                for (const [r, c] of positions) {
                    if (removed >= emptyCount) break;
                    if (puzzle[r][c] !== 0) { puzzle[r][c] = 0; removed++; }
                }

                return { puzzle, solution: fullSolution };
            };

            const startGame = (diff) => {
                const { puzzle, solution } = generateSudoku(diff);
                setDifficulty(diff);
                setBoard(puzzle);
                setSolution(solution);
                setFixed(puzzle.map((row, r) => row.map((cell, c) => cell !== 0)));
                setNotes(Array(9).fill(null).map(() => Array(9).fill(null).map(() => [])));
                setTimer(0);
                setCompleted(false);
                setSelected(null);
                setGameState('playing');
            };

            const reset = () => {
                setDifficulty(null);
                setGameState(null);
                setBoard(null);
                setSolution(null);
                setFixed(null);
                setNotes(Array(9).fill(null).map(() => Array(9).fill(null).map(() => [])));
                setTimer(0);
                setCompleted(false);
                setSelected(null);
            };

            useEffect(() => {
                if (gameState !== 'playing') return;
                const interval = setInterval(() => setTimer(t => t + 1), 1000);
                return () => clearInterval(interval);
            }, [gameState]);

            useEffect(() => {
                if (!board || !solution || gameState !== 'playing') return;
                let solved = true;
                for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) if (board[r][c] !== solution[r][c]) { solved = false; break; }
                if (solved && !completed) { setCompleted(true); onUpdateStats('sudoku', { completed: true, time: timer, gamesPlayed: true }); }
            }, [board, solution, completed, timer, onUpdateStats, gameState]);

            const handleCellClick = (r, c) => setSelected([r, c]);
            const handleNumberInput = (n) => {
                if (!selected || !board) return;
                const [r, c] = selected;
                if (fixed[r][c]) return;
                if (noteMode) { setNotes(prev => { const next = prev.map(row => row.map(cell => [...cell])); const idx = next[r][c].indexOf(n); if (idx > -1) next[r][c].splice(idx, 1); else next[r][c].push(n); return next; }); }
                else { setBoard(prev => { const next = prev.map(row => [...row]); next[r][c] = n; return next; }); setNotes(prev => { const next = prev.map(row => row.map(cell => [...cell])); next[r][c] = []; return next; }); }
            };

            // 获取单元格边框样式
            const getCellStyle = (r, c) => {
                let style = {};
                // 右边框 - 第2、5列后加粗
                if ((c + 1) % 3 === 0 && c !== 8) {
                    style.borderRight = '3px solid #1e40af';
                }
                // 下边框 - 第2、5行后加粗
                if ((r + 1) % 3 === 0 && r !== 8) {
                    style.borderBottom = '3px solid #1e40af';
                }
                return style;
            };

            if (!difficulty || gameState !== 'playing') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8">
                        <button onClick={onBack} className="back-btn text-2xl font-bold text-gray-600 hover:text-gray-800 transition-colors bg-white/80 px-4 py-2 rounded-xl shadow">← 返回</button>
                        <h1 className="text-6xl font-bold text-blue-600 mb-8">数独</h1>
                        <p className="text-gray-600 mb-8 text-xl">选择难度开始游戏</p>
                        <div className="flex gap-6">
                            <button onClick={() => startGame('easy')} className="bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-6 px-12 rounded-2xl shadow-lg transition-colors">
                                <div>简易</div>
                                <div className="text-sm font-normal mt-1">预填41个数字</div>
                            </button>
                            <button onClick={() => startGame('medium')} className="bg-yellow-500 hover:bg-yellow-600 text-white text-2xl font-bold py-6 px-12 rounded-2xl shadow-lg transition-colors">
                                <div>中等</div>
                                <div className="text-sm font-normal mt-1">预填31个数字</div>
                            </button>
                            <button onClick={() => startGame('hard')} className="bg-red-500 hover:bg-red-600 text-white text-2xl font-bold py-6 px-12 rounded-2xl shadow-lg transition-colors">
                                <div>困难</div>
                                <div className="text-sm font-normal mt-1">预填21个数字</div>
                            </button>
                        </div>
                    </div>
                );
            }

            const selectedValue = selected ? board[selected[0]][selected[1]] : null;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <button onClick={reset} className="back-btn text-2xl font-bold text-gray-600 hover:text-gray-800 transition-colors bg-white/80 px-4 py-2 rounded-xl shadow">← 返回</button>
                    <div className="flex items-center gap-6 mb-4 mt-16">
                        <h1 className="text-6xl font-bold text-blue-600">数独</h1>
                        <div className="bg-blue-100 rounded-xl px-4 py-2 text-center">
                            <div className="text-xs text-blue-600 font-bold">难度</div>
                            <div className="text-lg font-bold text-blue-800">{DIFFICULTY_SETTINGS[difficulty].name}</div>
                        </div>
                        <div className="bg-blue-100 rounded-xl px-6 py-3 text-center"><div className="text-sm text-blue-600 font-bold">时间</div><div className="text-3xl font-bold text-blue-800">{formatTime(timer)}</div></div>
                    </div>
                    <div className="bg-white rounded-2xl p-4 shadow-xl">
                        <div className="grid grid-cols-9" style={{ border: '3px solid #1e40af' }}>
                            {board.map((row, r) => row.map((cell, c) => {
                                const isSelected = selected && selected[0] === r && selected[1] === c;
                                const isSameNumber = selectedValue !== 0 && cell === selectedValue;
                                const isFixed = fixed[r][c];
                                return (
                                    <div
                                        key={`${r}-${c}`}
                                        onClick={() => handleCellClick(r, c)}
                                        className={`sudoku-cell ${isFixed ? 'fixed-cell' : ''} ${isSelected ? 'selected' : ''} ${isSameNumber && !isSelected ? 'same-number' : ''}`}
                                        style={getCellStyle(r, c)}
                                    >
                                        {cell !== 0 ? cell : notes[r][c].length > 0 ? <div className="note-grid">{[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => <div key={n}>{notes[r][c].includes(n) ? n : ''}</div>)}</div> : ''}
                                    </div>
                                );
                            }))}
                        </div>
                    </div>
                    <div className="flex items-center gap-4 mt-6">
                        <button onClick={() => setNoteMode(!noteMode)} className={`px-6 py-3 rounded-xl font-bold transition-colors ${noteMode ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>标记模式 {noteMode ? 'ON' : 'OFF'}</button>
                        <button onClick={reset} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">重新开始</button>
                    </div>
                    <div className="grid grid-cols-5 gap-3 mt-6">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => <button key={n} onClick={() => handleNumberInput(n)} className="w-16 h-16 bg-blue-100 hover:bg-blue-200 text-blue-800 text-2xl font-bold rounded-xl transition-colors">{n}</button>)}
                        <button onClick={() => selected && !fixed[selected[0]][selected[1]] && setBoard(prev => { const next = prev.map(row => [...row]); next[selected[0]][selected[1]] = 0; return next; })} className="w-16 h-16 bg-red-100 hover:bg-red-200 text-red-800 text-xl font-bold rounded-xl transition-colors">清除</button>
                    </div>
                    {completed && <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50"><div className="bg-white rounded-3xl p-10 text-center"><div className="text-5xl font-bold mb-4 text-blue-600">🎉 恭喜完成!</div><div className="text-2xl text-gray-600 mb-6">用时: {formatTime(timer)}</div><button onClick={reset} className="bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-3 px-8 rounded-xl">再玩一局</button></div></div>}
                </div>
            );
        };

        // ==================== 24点游戏 (简易模式 - 只加减法) ====================
        const Game24Point = ({ onBack, onUpdateStats }) => {
            const generateNumbers = () => {
                while (true) {
                    const patterns = [
                        () => {
                            const a = Math.floor(Math.random() * 15) + 1;
                            const b = Math.floor(Math.random() * Math.min(15, 24 - a - 2)) + 1;
                            const c = Math.floor(Math.random() * Math.min(15, 24 - a - b - 1)) + 1;
                            const d = 24 - a - b - c;
                            if (d > 0 && d <= 20) return [a, b, c, d];
                            return null;
                        },
                        () => {
                            const a = Math.floor(Math.random() * 15) + 10;
                            const b = Math.floor(Math.random() * 10) + 1;
                            const c = Math.floor(Math.random() * 10) + 1;
                            const d = a + b + c - 24;
                            if (d > 0 && d <= 20) return [a, b, c, d];
                            return null;
                        },
                        () => {
                            const a = Math.floor(Math.random() * 15) + 10;
                            const b = Math.floor(Math.random() * 10) + 1;
                            const d = Math.floor(Math.random() * 10) + 1;
                            const c = a + b + d - 24;
                            if (c > 0 && c <= 20) return [a, b, c, d];
                            return null;
                        },
                        () => {
                            const a = Math.floor(Math.random() * 10) + 15;
                            const b = Math.floor(Math.random() * 8) + 1;
                            const c = Math.floor(Math.random() * 10) + 1;
                            const d = 24 - a + b - c;
                            if (d > 0 && d <= 20) return [a, b, c, d];
                            return null;
                        }
                    ];

                    const pattern = patterns[Math.floor(Math.random() * patterns.length)];
                    const nums = pattern();
                    if (nums) return nums.sort(() => Math.random() - 0.5);
                }
            };

            const [numbers, setNumbers] = useState(() => generateNumbers());
            const [expression, setExpression] = useState('');
            const [result, setResult] = useState(null);
            const [usedIndices, setUsedIndices] = useState([]);
            const [completed, setCompleted] = useState(0);

            const handleNumberClick = (num, idx) => {
                if (usedIndices.includes(idx)) return;
                setExpression(prev => prev + num);
                setUsedIndices(prev => [...prev, idx]);
            };
            const handleOperatorClick = (op) => setExpression(prev => prev + ' ' + op + ' ');
            const handleClear = () => { setExpression(''); setUsedIndices([]); setResult(null); };
            const handleBackspace = () => {
                const parts = expression.trim().split(' ');
                if (parts.length === 0) return;
                const last = parts[parts.length - 1];
                if (!isNaN(last)) { setUsedIndices(prev => prev.slice(0, -1)); }
                setExpression(prev => parts.slice(0, -1).join(' '));
            };
            const checkAnswer = () => {
                try {
                    const val = eval(expression);
                    if (Math.abs(val - 24) < 0.0001) {
                        setResult({ success: true, message: '正确! 等于 24' });
                        setCompleted(c => c + 1);
                        onUpdateStats('24point', { completed: true });
                        setTimeout(() => { setNumbers(generateNumbers()); setExpression(''); setUsedIndices([]); setResult(null); }, 1500);
                    } else { setResult({ success: false, message: `等于 ${val}, 不是 24` }); onUpdateStats('24point', { attempt: true }); }
                } catch { setResult({ success: false, message: '表达式无效' }); }
            };
            const newProblem = () => { setNumbers(generateNumbers()); setExpression(''); setUsedIndices([]); setResult(null); };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <button onClick={onBack} className="back-btn text-2xl font-bold text-gray-600 hover:text-gray-800 transition-colors bg-white/80 px-4 py-2 rounded-xl shadow">← 返回</button>
                    <div className="flex items-center gap-6 mb-6 mt-16">
                        <h1 className="text-6xl font-bold text-green-600">24点</h1>
                        <div className="bg-green-100 rounded-xl px-6 py-3 text-center"><div className="text-sm text-green-600 font-bold">已完成</div><div className="text-3xl font-bold text-green-800">{completed}</div></div>
                    </div>
                    <p className="text-gray-600 mb-6 text-xl">使用 + 和 - 让四个数字等于 24 (简易模式)</p>
                    <div className="flex gap-6 mb-6">
                        {numbers.map((n, i) => <button key={i} onClick={() => handleNumberClick(n, i)} disabled={usedIndices.includes(i)} className={`w-24 h-24 text-4xl font-bold rounded-2xl transition-all ${usedIndices.includes(i) ? 'bg-gray-200 text-gray-400' : 'bg-green-100 hover:bg-green-200 text-green-800 shadow-lg'}`}>{n}</button>)}
                    </div>
                    <div className="bg-white rounded-xl p-4 min-w-[300px] text-center mb-4">
                        <div className="text-2xl font-mono text-gray-800 min-h-[40px]">{expression || '点击数字和运算符'}</div>
                    </div>
                    {result && <div className={`text-xl font-bold mb-4 ${result.success ? 'text-green-600' : 'text-red-600'}`}>{result.message}</div>}
                    <div className="grid grid-cols-2 gap-3 mb-8">
                        {['+', '-'].map(op => <button key={op} onClick={() => handleOperatorClick(op)} className="w-20 h-20 bg-green-600 hover:bg-green-700 text-white text-3xl font-bold rounded-xl">{op}</button>)}
                    </div>
                    <div className="flex gap-4 mt-8">
                        <button onClick={handleClear} className="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl">清除</button>
                        <button onClick={handleBackspace} className="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-6 rounded-xl">退格</button>
                        <button onClick={checkAnswer} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-xl">检查</button>
                        <button onClick={newProblem} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-xl">下一题</button>
                    </div>
                </div>
            );
        };

        // ==================== 主应用 ====================
        const App = () => {
            const [currentGame, setCurrentGame] = useState(null);
            const [stats, setStats] = useState(() => ({
                '2048': storage.get('2048-pad-stats', { bestScore: 0, gamesPlayed: 0, wins: 0 }),
                'sudoku': storage.get('sudoku-pad-stats', { completed: 0, bestTime: null, gamesPlayed: 0 }),
                '24point': storage.get('24point-pad-stats', { completed: 0, totalAttempts: 0 })
            }));

            const updateStats = useCallback((game, updates) => {
                setStats(prev => {
                    const newStats = { ...prev };
                    if (game === '2048') {
                        newStats['2048'] = { bestScore: Math.max(prev['2048'].bestScore, updates.bestScore || 0), gamesPlayed: prev['2048'].gamesPlayed + (updates.gamesPlayed ? 1 : 0), wins: prev['2048'].wins + (updates.wins ? 1 : 0) };
                        storage.set('2048-pad-stats', newStats['2048']);
                    } else if (game === 'sudoku') {
                        const newCompleted = prev.sudoku.completed + (updates.completed ? 1 : 0);
                        const newBestTime = updates.time && (!prev.sudoku.bestTime || updates.time < prev.sudoku.bestTime) ? updates.time : prev.sudoku.bestTime;
                        newStats.sudoku = { completed: newCompleted, bestTime: newBestTime, gamesPlayed: prev.sudoku.gamesPlayed + (updates.gamesPlayed ? 1 : 0) };
                        storage.set('sudoku-pad-stats', newStats.sudoku);
                    } else if (game === '24point') {
                        newStats['24point'] = {
                            completed: prev['24point'].completed + (updates.completed ? 1 : 0),
                            totalAttempts: prev['24point'].totalAttempts + (updates.attempt ? 1 : 0)
                        };
                        storage.set('24point-pad-stats', newStats['24point']);
                    }
                    return newStats;
                });
            }, []);

            if (currentGame === '2048') return <Game2048 onBack={() => setCurrentGame(null)} onUpdateStats={updateStats} />;
            if (currentGame === 'sudoku') return <Sudoku onBack={() => setCurrentGame(null)} onUpdateStats={updateStats} />;
            if (currentGame === '24point') return <Game24Point onBack={() => setCurrentGame(null)} onUpdateStats={updateStats} />;
            return <GameSelector onSelectGame={setCurrentGame} stats={stats} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
